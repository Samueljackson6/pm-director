[pytest]
# Run only the tests under backend/tests
testpaths = tests
# Make both the backend directory and the project root importable so that
# ``import backend.main`` / ``from backend.database import ...`` resolve
# correctly when pytest is launched from the backend/ directory.
pythonpath = . ..
# Default test module discovery pattern.
python_files = test_*.py
# Quiet output by default; override with `pytest -v` when needed.
addopts = -q
