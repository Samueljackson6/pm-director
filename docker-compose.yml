# pm-director 专用 Docker 部署
# 注意：此 compose 文件使用独立网络，不会影响其他项目
name: pm-director

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pm-director-backend
    ports:
      - "8800:8800"
    volumes:
      - ./database:/app/database
      - ./cache:/app/cache
    networks:
      - pm-director-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pm-director-frontend
    ports:
      - "5777:80"
    depends_on:
      - backend
    networks:
      - pm-director-net
    restart: unless-stopped

networks:
  pm-director-net:
    driver: bridge
    name: pm-director-net
