# pm-director 专用 Docker 部署
# 本 compose 只部署 pm-director 自身的服务（FastAPI + Nginx）
# 共享基础设施（MySQL、Redis）由 RuoYi Office 管理，参见：
#   CROSS_PROJECT_INFRA.md (§2 共享服务清单、§4 行为准则)
# 应急恢复：docker compose -f /home/samuel/ruoyi-office/script/docker/infra-docker-compose.yml up -d
name: pm-director

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pm-director-backend
    ports:
      - "8800:8800"
    volumes:
      - ./database:/app/database
      - ./cache:/app/cache
    networks:
      - pm-director-net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: pm-director-frontend
    ports:
      # 注意：Windows 保留端口 5690-5789，不可用
      - "8900:80"
    volumes:
      # 使用本机构建的 dist 产物（避免 Docker 内 Vite 7 + jiti 兼容问题）
      - ./ui-vben/apps/web-antd/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - pm-director-net
    restart: unless-stopped

networks:
  pm-director-net:
    driver: bridge
    name: pm-director-net
