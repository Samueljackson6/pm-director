version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pm-director-backend
    ports:
      - "8800:8800"
    volumes:
      - ./database:/app/database
      - ./cache:/app/cache
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8800

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pm-director-frontend
    ports:
      - "5777:80"
    depends_on:
      - backend
    restart: unless-stopped
