# pm-director 专用 Docker 部署
# 本 compose 只部署 pm-director 自身的服务（FastAPI + Nginx）
# 共享基础设施（MySQL、Redis）由 RuoYi Office 管理，参见：
#   CROSS_PROJECT_INFRA.md (§2 共享服务清单、§4 行为准则)
# 应急恢复：docker compose -f /home/samuel/ruoyi-office/script/docker/infra-docker-compose.yml up -d
name: pm-director

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pm-director-backend
    # ⚠️ 主机 8800 被 Windows Hyper-V 保留（端口范围 8701-8800）
    # 改用 18080 对外暴露，容器内仍为 8800
    ports:
      - "18080:8800"
    volumes:
      - ./database:/app/database
      - ./cache:/app/cache
      - ./uploads:/app/uploads
    networks:
      - pm-director-net
    restart: unless-stopped
    # 后端就绪探针：命中 GET /ready，确认应用与数据库均可用
    # 使用 python 而非 curl（python:3.11-slim 基础镜像默认未安装 curl）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8800/ready').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: pm-director-frontend
    ports:
      # ⚠️ 主机 8900 被 Windows Hyper-V 保留（端口范围 8801-8900）
      # 改用 18090 对外暴露，容器内仍为 80
      - "18090:80"
    volumes:
      # 使用本机构建的 dist 产物（避免 Docker 内 Vite 7 + jiti 兼容问题）
      - ./ui-vben/apps/web-antd/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - pm-director-net
    restart: unless-stopped

networks:
  pm-director-net:
    driver: bridge
    name: pm-director-net
