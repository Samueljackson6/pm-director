# pm-director CI/CD 工作流
# 236 自托管 Runner (236-runner) 负责部署
# GitHub-hosted runner 负责代码验证

name: CI/CD

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Python 代码质量检查 (GitHub-hosted)
  # ============================================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff

      - name: Python syntax check
        run: |
          if [ -d "backend" ]; then
            for f in $(find backend -name "*.py"); do
              python -c "import ast; ast.parse(open('$f').read())" && echo "  OK $f"
            done
            ruff check backend/ --quiet || true
          fi

  # ============================================================
  # Job 2: UI 文件完整性 (GitHub-hosted)
  # ============================================================
  ui-validate:
    name: UI Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check UI files
        run: |
          for f in \
            ui/src/api/contracts.ts ui/src/api/invoices.ts ui/src/api/suppliers.ts \
            ui/src/views/contracts/index.vue ui/src/views/contracts/detail.vue \
            ui/src/views/invoices/index.vue ui/src/views/suppliers/index.vue \
            ui/src/router/routes/modules/contracts.ts \
            ui/src/router/routes/modules/invoices.ts \
            ui/src/router/routes/modules/suppliers.ts; do
            [ -f "$f" ] && echo "  OK $f" || echo "  MISSING $f"
          done

      - name: Check route path format
        run: |
          for f in ui/src/router/routes/modules/*.ts; do
            if grep -q "path: ''" "$f" 2>/dev/null; then
              echo "  OK $(basename $f) path:''"
            else
              echo "  WARN $(basename $f) no path:''"
            fi
          done

  # ============================================================
  # Job 3: 部署到 236 (自托管 Runner)
  # ============================================================
  deploy:
    name: 部署到236
    needs: [python-lint, ui-validate]
    runs-on: [self-hosted, 236, production]
    if: github.ref == 'refs/heads/master' && success()
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend + frontend
        run: |
          echo "=== 开始部署 ==="
          rsync -a --exclude='database/' --exclude='cache/' --exclude='ui-vben/' \
            "${{ github.workspace }}/" /home/samuel/.openclaw/workspace/pm-director/
          cd /home/samuel/.openclaw/workspace/pm-director
          bash scripts/deploy-236.sh all

      - name: Verify
        shell: bash
        run: |
          set -e
          echo "=== 验证 ==="
          curl -s -o /dev/null -w 'Frontend: HTTP %{http_code}\n' http://localhost:5777/
          curl -s -o /dev/null -w 'Backend: HTTP %{http_code}\n' http://localhost:8800/api/stats
          DIST=/home/samuel/ruoyi-office-vben/apps/web-antd/dist
          echo "--- JS bundles ---"
          ls $DIST/js/contracts-*.js 2>/dev/null && echo "contracts: OK" || echo "contracts: not found (may be inlined)"
          ls $DIST/js/invoices-*.js 2>/dev/null && echo "invoices: OK" || echo "invoices: not found (may be inlined)"
          ls $DIST/js/suppliers-*.js 2>/dev/null && echo "suppliers: OK" || echo "suppliers: not found (may be inlined)"
          echo "--- Build time ---"
          stat --format='%y' $DIST/index.html 2>/dev/null || echo "unknown"

      - name: Audit
        shell: bash
        run: |
          echo "=== 审计 ==="
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
          FE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5777/ || echo 000)
          BE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8800/api/stats || echo 000)
          echo "Frontend: HTTP $FE"
          echo "Backend:  HTTP $BE"
          if [ "$FE" = "200" ] && [ "$BE" = "200" ]; then
            echo "=== ✅ 审计通过 ==="
          else
            echo "=== ❌ 审计失败 ==="
            exit 1
          fi
