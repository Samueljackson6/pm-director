server {
    listen       80;
    server_name  localhost;

    # 前端静态文件
    location /web/ {
        alias   /usr/share/nginx/html/;
        try_files $uri $uri/ /web/index.html;
        index  index.html;
    }

    # 根路径重定向到 /web/（保留原始 Host 和端口）
    location / {
        return 301 $scheme://$http_host/web/;
    }

    # API 代理到后端（使用容器名，依赖 Docker 内部 DNS）
    location /api/ {
        proxy_pass http://pm-director-backend:8800/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vben Admin 默认 API 前缀 /admin-api → 移除前缀后转发到后端
    location /admin-api/ {
        rewrite ^/admin-api/(.*) /$1 break;
        proxy_pass http://pm-director-backend:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /system/ {
        proxy_pass http://pm-director-backend:8800/system/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK\n";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
